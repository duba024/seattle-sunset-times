name: Update Sun Calendar

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Set remote URL with GITHUB_TOKEN
        run: |
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/duba024/seattle-sunset-times.git"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests ics pytz astral

      - name: Generate ICS file
        run: python create_calendar_local.py

      - name: Commit and push changes
        run: |
          git add sun.ics
          git commit -m "Update sun.ics [skip ci]" || echo "No changes to commit"
          git push origin HEAD:main
